<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Фильм — Kinotower</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="movie-page">

    <img src="https://via.placeholder.com/300x450" alt="Movie">

    <div class="movie-info">
        <h1>Название фильма</h1>
        <p>Описание фильма. Здесь будет текст из API.</p>

        <h3>Оценить фильм</h3>
        <select>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>

        <textarea placeholder="Напишите отзыв"></textarea>
        <button>Отправить</button>
    </div>

</main>

</body>
</html>
